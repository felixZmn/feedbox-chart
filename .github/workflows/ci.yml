name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    helm:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Helm
              uses: azure/setup-helm@v5

            - name: Helm lint
              run: helm lint .

            - name: Read chart name
              id: chart
              shell: bash
              run: |
                  name="$(helm show chart . | awk '/^name:/ {print $2}')"
                  echo "name=$name" >> "$GITHUB_OUTPUT"

            - name: Helm template
              run: helm template "${{ steps.chart.outputs.name }}" . > /dev/null
