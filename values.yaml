replicaCount: 1

image:
  repository: ghcr.io/felixzmn/docker
  name: feedbox
  tag: ""
  pullPolicy: IfNotPresent  # Changed to best practice default

imagePullSecrets: []
# - name: regcred

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  automount: false
  name: ""

# Add custom pod annotations if needed (e.g., Prometheus scrape)
podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080
  annotations: {}

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

# Probes are now fully configurable
startupProbe:
  enabled: true
  periodSeconds: 10
  failureThreshold: 30

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

# Application ConfigMap data
config:
  quarkus.http.host: "0.0.0.0"
  quarkus.http.port: "8080"
  app.http.user-agent: "FeedBox/2.0.2-SNAPSHOT"

# Extend environment variables easily
extraEnv: []
# - name: MY_CUSTOM_VAR
#   value: "custom"
# - name: MY_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: my-key

# Extend envFrom sources
extraEnvFrom: []
# - configMapRef:
#     name: extra-configmap
# - secretRef:
#     name: extra-secret

sso:
  enabled: true
  clientId: ""
  redirectUri: ""
  authServerUrl: ""
  jwtPublicKeyLocation: ""
  endSessionEndpoint: ""

dbSecretName: newsfeed-pguser-newsfeed
database:
  jdbcUrlKey: jdbc-uri

# NOTE: Only enable ONE of ingress or httpRoute. Kubernetes does not enforce mutual exclusivity.
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: feedbox.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: feedbox-tls
  #   hosts:
  #     - feedbox.example.com

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
      namespace: default
  hostnames:
    - feedbox.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

nodeSelector: {}
tolerations: []
affinity: {}